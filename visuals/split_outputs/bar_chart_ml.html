<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Chart ML</title>
  <style>
    :root {
      --bg: #3A295B;
      --text: #FFFFFF;
      --cyan: #65F0F9;
      --blue: #7BA5D8;
      --deep-purple: #4B2A8C;
      --light-purple: #A888D5;
      --outline: #8B5CF6;
      --panel: rgba(84, 56, 134, 0.42);
      --border: rgba(255, 255, 255, 0.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 16%, rgba(101,240,249,0.16), transparent 18%),
        radial-gradient(circle at 84% 12%, rgba(168,136,213,0.20), transparent 20%),
        linear-gradient(135deg, #2E2049 0%, #3A295B 48%, #4B2A8C 100%);
      padding: 24px;
    }
    .card {
      max-width: 1200px;
      margin: 0 auto;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(82,55,132,0.70), rgba(46,31,79,0.95));
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      overflow: hidden;
    }
    .body { padding: 26px; }
    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .hex {
      width: 14px;
      height: 14px;
      display: inline-block;
      background: var(--cyan);
      clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0 50%);
      border: 1px solid var(--outline);
    }
    .note-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px dashed rgba(101,240,249,0.42);
      color: rgba(255,255,255,0.86);
      line-height: 1.7;
    }
    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .matrix-card {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .matrix-title {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .matrix {
      display: grid;
      grid-template-columns: 74px repeat(2, 1fr);
      gap: 8px;
    }
    .matrix-label, .matrix-cell {
      padding: 12px 10px;
      border-radius: 14px;
      text-align: center;
      font-size: 13px;
    }
    .matrix-label {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.80);
    }
    .matrix-cell {
      font-weight: 700;
      color: white;
    }
    .word-cols {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .word-panel {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .word-panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .word-cloud-svg {
      width: 100%;
      height: 420px;
      display: block;
      border-radius: 20px;
      background:
        radial-gradient(circle at 22% 18%, rgba(101,240,249,0.10), transparent 24%),
        radial-gradient(circle at 78% 22%, rgba(168,136,213,0.16), transparent 26%),
        rgba(255,255,255,0.03);
    }
    .cloud-word {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      text-anchor: middle;
      dominant-baseline: middle;
      stroke: rgba(40, 21, 70, 0.25);
      stroke-width: 1px;
      paint-order: stroke fill;
    }
    @media (max-width: 900px) {
      .matrix-grid, .word-cols { grid-template-columns: 1fr; }
    }
  </style>
</head>
